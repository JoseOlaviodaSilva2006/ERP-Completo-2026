name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: "https://erp-completo-2026.onrender.com/api"
          NEXT_PUBLIC_SUPABASE_URL: "https://zaibewsevrxmsgmvotvg.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_aMqwIehYtyjbaODTA8BjUQ_LuSksmQU"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: erp-completo-493eb
          channelId: live
          entryPoint: ./apps/web
